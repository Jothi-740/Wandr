<!-- Chatbot Icon -->
<div id="chatbot-icon" class="pulse" onclick="toggleChatbot()">🤖</div>

<!-- Chatbot Popup -->
<div id="chatbot-box">
    <div id="chatbot-header">
        <div id="header-left">
            <div id="wandr-logo">W</div>
            <span>WandrGuide✨</span>
        </div>
        <span onclick="clearChat()" style="cursor:pointer;">🗑️</span>
        <span onclick="toggleChatbot()" style="cursor:pointer;">✖</span>


    </div>

    <div id="chat-messages"></div>


    <div id="quick-buttons">
        <button onclick="sendQuickMessage('places')">Places</button>
        <button onclick="sendQuickMessage('restaurants')">Restaurants</button>
        <button onclick="sendQuickMessage('hotels')">Hotels</button>
        <button onclick="sendQuickMessage('transport')">Transport</button>
    </div>

    <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="Ask about Chennai travel...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>


<style>
    #chatbot-icon {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        width: 60px;
        height: 60px;
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        cursor: pointer;
    }

    /* pulse animation */
    #chatbot-icon.pulse {
        animation: pulseGlow 2.5s infinite;
    }

    @keyframes pulseGlow {
        0% {
            box-shadow: 0 0 0 0 rgba(90, 120, 255, 0.6);
        }

        70% {
            box-shadow: 0 0 0 12px rgba(90, 120, 255, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(90, 120, 255, 0);
        }
    }

    #chatbot-box {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
        width: 320px;
        height: 420px;
        border-radius: 12px;
        overflow: hidden;
        font-family: Arial;
        color: #FFFFFF;

        background:
            radial-gradient(ellipse at 30% 20%, rgba(90, 120, 255, 0.25), transparent 45%),
            radial-gradient(ellipse at 70% 80%, rgba(46, 196, 255, 0.18), transparent 50%),
            linear-gradient(180deg, #0F1C2E, #2B124C);

        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);

        display: flex;
        flex-direction: column;

        transform: translateY(40px);
        opacity: 0;
        pointer-events: none;
        transition: all 0.35s ease;
    }

    /* visible state */
    #chatbot-box.active {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
    }


    #chatbot-header {
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
        color: #FFFFFF;
        padding: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    #header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    #wandr-logo {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        font-size: 16px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    #chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    /* Message bubbles */
    .user-msg {
        align-self: flex-end;
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
        color: #fff;
        padding: 8px 12px;
        border-radius: 15px 15px 0 15px;
        max-width: 70%;
    }

    .bot-msg {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        padding: 8px 12px;
        border-radius: 15px 15px 15px 0;
        max-width: 70%;
    }


    #chat-input-area {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(6px);
    }

    #chat-input {
        flex: 1;
        padding: 10px 14px;
        border: none;
        outline: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
    }

    #chat-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    #chat-input-area button {
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
        border: none;
        color: #fff;
        padding: 10px 16px;
        border-radius: 20px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 3px 10px rgba(90, 120, 255, 0.35);
    }

    #chat-input-area button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 16px rgba(90, 120, 255, 0.5);
    }


    #chat-input-area button:active {
        transform: translateY(0px);
        box-shadow: 0 2px 6px rgba(90, 120, 255, 0.35);
    }


    .typing {
        align-self: flex-start;
        background: #F1F0F0;
        padding: 8px 12px;
        border-radius: 15px 15px 15px 0;
        font-style: italic;
        color: #666;
    }

    #quick-buttons {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        white-space: nowrap;
    }

    #quick-buttons button {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 6px 12px;
        border-radius: 16px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s ease;
    }

    #quick-buttons button:hover {
        background: linear-gradient(90deg, #5a78ff, #2ec4ff);
    }
</style>


<script>

    let chatbotInitialized = false;

    function toggleChatbot() {
        let box = document.getElementById("chatbot-box");
        let icon = document.getElementById("chatbot-icon");

        box.classList.toggle("active");

        if (box.classList.contains("active")) {
            icon.classList.remove("pulse");

            if (!chatbotInitialized) {

                // Get current hour
                let hour = new Date().getHours();
                let greeting = "";

                if (hour < 12) {
                    greeting = "Good Morning 🌤️ Planning a Chennai trip today?";
                }
                else if (hour < 18) {
                    greeting = "Good Afternoon ☀️ Looking for places to explore in Chennai?";
                }
                else {
                    greeting = "Good Evening 🌆 Looking for dinner spots or night views?";
                }

                document.getElementById("chat-messages").innerHTML += `
                <div class="bot-msg">
                    ${greeting} <br><br>
                    I'm <b>WandrGuide</b>, your Chennai travel assistant.
                </div>
            `;
                saveChat();

                chatbotInitialized = true;
            }

        } else {
            icon.classList.add("pulse");
        }
    }



    function sendMessage() {
        let input = document.getElementById("chat-input");
        let msg = input.value.trim();
        if (msg === "") return;

        let chat = document.getElementById("chat-messages");

        // Show user message
        chat.innerHTML += `<div class="user-msg">${msg}</div>`;
        saveChat();
        // Show typing indicator
        chat.innerHTML += `<div id="typing-indicator" class="typing">Assistant is typing...</div>`;
        chat.scrollTop = chat.scrollHeight;

        // Call chatbot backend
        fetch(`/chatbot/ask/?message=${msg}`)
            .then(res => res.json())
            .then(data => {

                // Delay reply slightly so typing is visible
                setTimeout(() => {

                    let typing = document.getElementById("typing-indicator");
                    if (typing) {
                        typing.remove();
                    }

                    chat.innerHTML += `<div class="bot-msg">${data.reply}</div>`;
                    saveChat();
                    chat.scrollTop = chat.scrollHeight;

                }, 700);  // delay in milliseconds
            });

        input.value = "";
    }

    function sendQuickMessage(text) {
        document.getElementById("chat-input").value = text;
        sendMessage();
    }

    document.getElementById("chat-input").addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();  // prevents page reload
            sendMessage();
        }
    });

    document.getElementById("chat-input").addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();  // prevents page reload
            sendMessage();
        }
    });

    function saveChat() {
        let chat = document.getElementById("chat-messages").innerHTML;
        localStorage.setItem("wandrChat", chat);
    }

    function loadChat() {
        let savedChat = localStorage.getItem("wandrChat");
        if (savedChat) {
            document.getElementById("chat-messages").innerHTML = savedChat;
            chatbotInitialized = true; // prevent welcome message again
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        loadChat();
    });

    function clearChat() {
        localStorage.removeItem("wandrChat");
        document.getElementById("chat-messages").innerHTML = "";
        chatbotInitialized = false;
    }


</script>
