{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wandr Support</title>
  
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(90, 120, 255, 0.25), transparent 45%),
        radial-gradient(ellipse at 70% 80%, rgba(46, 196, 255, 0.18), transparent 50%),
        linear-gradient(180deg, #0F1C2E, #2B124C);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .support-form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #555;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
      margin-top: 5px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }
    .radio-group label {
      font-weight: normal;
      cursor: pointer;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #0077cc;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="topbar topbar-col">
      <button class="back-btn" onclick="window.history.back()">
        <i class="fa fa-arrow-left"></i>
      </button>
    </div>

<form class="support-form" id="supportForm">
  <h2>Wandr Support</h2>

  <!-- Question 1: Name -->
  <label for="name">1. Your Name:</label>
  <input type="text" id="name" name="name" placeholder="Enter your name" required>

  <!-- Question 2: Email -->
  <label for="email">2. Your Email:</label>
  <input type="email" id="email" name="email" placeholder="Enter your email" required>

  <!-- Question 3: Issue Type -->
  
  <select id="issueType" name="issueType" required>
  <option value="" disabled selected>--Select Issue Type--</option>
  <option value="App Crashes / Technical Errors">App Crashes / Technical Errors</option>
  <option value="Login / Account Issues">Login / Account Issues</option>
  <option value="Navigation / Map Errors">Navigation / Map Errors</option>
  <option value="Nearby Places / Suggestions Missing">Nearby Places / Suggestions Missing</option>
  <option value="Content / Information Errors">Content / Information Errors</option>
  <option value="Other Issues">Other Issues</option>
</select>

  <!-- Question 4: Priority -->
  <label>4. Priority Level:</label>
  <div class="radio-group">
    <input type="radio" id="priorityHigh" name="priority" value="High" required>
    <label for="priorityHigh">High</label>

    <input type="radio" id="priorityMedium" name="priority" value="Medium" required>
    <label for="priorityMedium">Medium</label>

    <input type="radio" id="priorityLow" name="priority" value="Low" required>
    <label for="priorityLow">Low</label>
  </div>

  <!-- Question 5: Description -->
  <label for="description">5. Describe Your Issue:</label>
  <textarea id="description" name="description" rows="5" placeholder="Explain your issue in detail..." required></textarea>

  <button type="submit">Submit</button>
</form>
</div>
<script>
const form = document.getElementById('supportForm');
form.addEventListener('submit', function(e) {
  e.preventDefault();
  const data = new FormData(form);
  let supportData = {};
  data.forEach((value, key) => supportData[key] = value);

  console.log("Support Submitted:", supportData);
  alert("Thank you! Your support request has been submitted.");
  form.reset();
});
</script>

</body>
</html>
