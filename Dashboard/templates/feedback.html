{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wandr Feedback</title>
  
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(90, 120, 255, 0.25), transparent 45%),
        radial-gradient(ellipse at 70% 80%, rgba(46, 196, 255, 0.18), transparent 50%),
        linear-gradient(180deg, #0F1C2E, #2B124C);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .feedback-form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #555;
    }
    select, textarea {
      margin-top: 5px;
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 5px;
    }
    .radio-group label {
      font-weight: normal;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #0077cc;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="topbar topbar-col">
      <button class="back-btn" onclick="window.history.back()">
        <i class="fa fa-arrow-left"></i>
      </button>
    </div>

  <form class="feedback-form" id="feedbackForm">
    <h2>Wandr Feedback</h2>

    <!-- Question 1 -->
    <label for="overall">1. Overall Experience:</label>
    <select id="overall" name="overall" required>
      <option value="" disabled selected>--Select--</option>
      <option value="1">1 ⭐ Poor</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐ Average</option>
      <option value="4">4 ⭐ Good</option>
      <option value="5">5 ⭐ Excellent</option>
    </select>

    <!-- Question 2 -->
    <label>2. Was it easy to find suitable hotels or accommodations?</label>
    <div class="radio-group">
      <input type="radio" id="hotelsYes" name="hotels" value="Yes" required>
      <label for="hotelsYes">Yes</label>

      <input type="radio" id="hotelsSomewhat" name="hotels" value="Somewhat" required>
      <label for="hotelsSomewhat">Somewhat</label>

      <input type="radio" id="hotelsNo" name="hotels" value="No" required>
      <label for="hotelsNo">No</label>
    </div>

    <!-- Question 3 -->
    <label>3. Did you find the restaurant/food suggestions helpful?</label>
    <div class="radio-group">
      <input type="radio" id="foodYes" name="food" value="Yes" required>
      <label for="foodYes">Yes</label>

      <input type="radio" id="foodSomewhat" name="food" value="Somewhat" required>
      <label for="foodSomewhat">Somewhat</label>

      <input type="radio" id="foodNo" name="food" value="No" required>
      <label for="foodNo">No</label>
    </div>

    <!-- Question 4 -->
    <label>4. Was it easy to discover popular places to visit nearby?</label>
    <div class="radio-group">
      <input type="radio" id="placesYes" name="places" value="Yes" required>
      <label for="placesYes">Yes</label>

      <input type="radio" id="placesSomewhat" name="places" value="Somewhat" required>
      <label for="placesSomewhat">Somewhat</label>

      <input type="radio" id="placesNo" name="places" value="No" required>
      <label for="placesNo">No</label>
    </div>

    <!-- Question 5 -->
    <label>5. Did the app provide clear and useful transport details?</label>
    <div class="radio-group">
      <input type="radio" id="transportYes" name="transport" value="Yes" required>
      <label for="transportYes">Yes</label>

      <input type="radio" id="transportSomewhat" name="transport" value="Somewhat" required>
      <label for="transportSomewhat">Somewhat</label>

      <input type="radio" id="transportNo" name="transport" value="No" required>
      <label for="transportNo">No</label>
    </div>

    <!-- Question 6 -->
    <label for="usability">6. Was the app easy to use and navigate?</label>
    <select id="usability" name="usability" required>
      <option value="" disabled selected>--Select--</option>
      <option value="1">1 ⭐ Very Difficult</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐ Average</option>
      <option value="4">4 ⭐ Easy</option>
      <option value="5">5 ⭐ Very Easy</option>
    </select>

    <!-- Question 7 -->
    <label for="comments">7. Additional Suggestions (Optional):</label>
    <textarea id="comments" name="comments" rows="4" placeholder="Write your feedback here..."></textarea>

    <button type="submit">Submit Feedback</button>
  </form>
  </div>

  <script>
    const form = document.getElementById('feedbackForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const data = new FormData(form);
      let feedback = {};
      data.forEach((value, key) => feedback[key] = value);

      console.log("Feedback Submitted:", feedback);
      alert("Thank you for your feedback!");
      form.reset();
    });
  </script>

</body>
</html>
