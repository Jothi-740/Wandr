{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Route Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<style>
body {
    background: #1e1e2d;
    color: #e2e2ec;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    overflow: hidden;
}
.app-container {
    display: flex;
    height: 100vh;
    width: 100vw;
    background: #1e1e2d;
}
/* SIDEBAR */
.sidebar {
    width: 70px;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    z-index: 1000;
}
.side-logo img {
    width: 40px;
    margin-bottom: 30px;
}
.sidebar a {
    color: white;
    font-size: 20px;
    margin: 20px 0;
    text-decoration: none;
    transition: 0.3s;
}
.sidebar a.active,
.sidebar a:hover {
    color: #4cc9f0;
}
.dashboard {
    display: flex;
    flex-grow: 1;
    padding: 20px;
    padding-left: 90px;
    box-sizing: border-box;
    gap: 30px;
}
.details-sidebar {
    width: 35%;
    max-width: 450px;
    background: #1e1e2d;
    display: flex;
    flex-direction: column;
}
.back-nav {
    margin-bottom: 20px;
}
.back-btn {
    background: none;
    border: none;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    vertical-align: middle;
}
.details-panel {
    background: #252538;
    border-radius: 20px;
    padding: 30px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
h2 {
    margin-top: 0;
    margin-bottom: 5px;
    font-size: 2rem;
    color: white;
}
.meta-text {
    color: #a0a0b5;
    margin: 5px 0;
    font-size: 1.1rem;
}
.travel-mode-section {
    margin-top: 25px;
}
.travel-mode-section label {
    display: block;
    color: #a0a0b5;
    margin-bottom: 8px;
    font-size: 1rem;
}
.custom-select {
    width: 100%;
    padding: 15px;
    background: #1e1e2d;
    border: 1px solid #3d3d5c;
    border-radius: 10px;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    appearance: none;
    outline: none;
}
.custom-select:focus {
    border-color: #4cc9f0;
}
.stats-box {
    margin-top: 30px;
    background: #1e1e2d;
    border: 1px solid #3d3d5c;
    border-radius: 15px;
    padding: 20px;
    color: #a0a0b5;
    line-height: 1.8;
}
.stats-box span {
    color: #4cc9f0;
    font-weight: bold;
}
.direction-header {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.direction-icon {
    width: 40px;
    height: 40px;
    background: #3498db;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.2rem;
    box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
}
.next-street-text {
    font-size: 1rem;
    color: #e2e2ec;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
}
.divider {
    height: 1px;
    background: #3d3d5c;
    margin: 15px 0;
}
.actions {
    display: flex;
    gap: 15px;
    margin-top: auto;
}
.btn-recenter, .btn-start {
    flex: 1;
    padding: 18px;
    border: none;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-recenter {
    background: #3498db;
    color: white;
    box-shadow: 0 4px 15px rgba(52,152,219,0.3);
}
.btn-start {
    background: linear-gradient(135deg, #4cc9f0, #3498db);
    color: white;
    border: none;
    box-shadow: 0 4px 15px rgba(76,201,240,0.4);
}
.btn-recenter:hover { background: #2980b9; }
.btn-start:hover { opacity: 0.9; }

/* Map Area */
.map-area {
    flex-grow: 1;
    position: relative;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    border: 4px solid #252538;
}
#map {
    height: 100%;
    width: 100%;
    background: #1a1a24;
}
/* Hide default routing text panel */
.leaflet-routing-container {
    display: none !important;
}
</style>
</head>
<body>

<div class="app-container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="side-logo">
            <img src="{% static 'images/logo.png' %}">
        </div>
        <a href="{% url 'home' %}"><i class="fa fa-home"></i></a>
        <a href="{% url 'stay' %}"><i class="fa fa-hotel"></i></a>
        <a href="{% url 'food:nearby_food' %}"><i class="fa fa-utensils"></i></a>
        <a href="{% url 'transport:nearby_transport' %}" class="active"><i class="fa fa-bus"></i></a>
        <a href="{% url 'emergency:dashboard' %}"><i class="fa-solid fa-truck-medical"></i></a>
        <a href="{% url 'account:dashboard' %}"><i class="fa fa-user"></i></a> 
    </div>

    <div class="dashboard">
    <div class="details-sidebar">
        <div class="back-nav">
            <button class="back-btn" onclick="window.location.href='{% url 'transport:nearby_transport' %}'"><i class="fas fa-arrow-left"></i></button>
        </div>
        
        <div class="details-panel">
            <h2 id="destName">{{name}}</h2>
            <!-- Removed Distance and ETA top text here -->
            
            <div class="travel-mode-section">
                <label>Travel Mode</label>
                <select id="mode" class="custom-select" onchange="updateNav()">
                    <option value="walk">🏃 Walking</option>
                    <option value="bike">🏍 Two Wheeler</option>
                    <option value="car">🚗 Car</option>
                </select>
            </div>
            
            <div class="stats-box">
                Speed: <span id="speed">0</span> km/h<br>
                ETA: <span id="eta">0</span> min<br>
                Remaining: <span id="remain">0</span> km
            </div>
            
            <div class="direction-header" id="next-direction">
                <div class="direction-icon">
                    <i class="fas fa-arrow-up"></i>
                </div>
                <div class="next-street-text">
                    <span>Next street: --</span>
                    <i class="fas fa-volume-up" id="voiceToggle" style="cursor: pointer; color: #4cc9f0;" onclick="toggleVoice()" title="Toggle Voice Directions"></i>
                </div>
            </div>
            <div class="divider"></div>
            
            <div class="actions">
                <button class="btn-recenter" id="recenterBtn"><i class="fas fa-map-marker-alt" style="color:#e74c3c;"></i> Recenter</button>
                <button class="btn-start" id="startBtn"><i class="fas fa-play"></i> Start Journey</button>
            </div>
        </div>
    </div>
    
    <div class="map-area">
        <div id="map"></div>
    </div>
</div> <!-- End Dashboard -->
</div> <!-- End App Container -->

<script>
    const destLat = parseFloat("{{lat}}");
    const destLon = parseFloat("{{lon}}");
    
    let map;
    let userMarker;
    let routingControl;
    let totalDistance = 0;
    let watchId;
    let voiceEnabled = false;
    let lastSpoken = "";
    
    function speakInstruction(text) {
        if (voiceEnabled && 'speechSynthesis' in window && text !== lastSpoken) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
            lastSpoken = text;
        }
    }

    function toggleVoice() {
        voiceEnabled = !voiceEnabled;
        const icon = document.getElementById("voiceToggle");
        if (voiceEnabled) {
            icon.className = "fas fa-volume-up";
            icon.style.color = "#4cc9f0";
            const currentText = document.querySelector('.next-street-text span').innerText.replace("Next street: ", "");
            if(currentText && currentText !== "--") {
                speakInstruction(currentText);
            }
        } else {
            icon.className = "fas fa-volume-mute";
            icon.style.color = "#a0a0b5";
            window.speechSynthesis.cancel();
            lastSpoken = "";
        }
    }
    
    function getSpeed() {
        const mode = document.getElementById('mode').value;
        if(mode==="walk") return 5;
        if(mode==="bike") return 35;
        if(mode==="car") return 45;
    }
    
    function getDistance(lat1,lon1,lat2,lon2) {
        const R=6371e3;
        const φ1=lat1*Math.PI/180;
        const φ2=lat2*Math.PI/180;
        const Δφ=(lat2-lat1)*Math.PI/180;
        const Δλ=(lon2-lon1)*Math.PI/180;
        const a= Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        return R*c;
    }

    function updateNav() {
        if(routingControl) {
            routingControl.route();
        }
    }
    
    function initNavigation() {
        navigator.geolocation.getCurrentPosition(function(pos){
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            map = L.map('map', {zoomControl: false}).setView([lat,lon], 16);
            L.control.zoom({position: 'topright'}).addTo(map);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            userMarker = L.marker([lat,lon]).addTo(map).bindPopup("You");
            
            routingControl = L.Routing.control({
                waypoints: [L.latLng(lat,lon), L.latLng(destLat,destLon)],
                routeWhileDragging: false,
                addWaypoints: false,
                draggableWaypoints: false,
                createMarker: () => null,
                lineOptions: { styles: [{color: '#ff4757', weight: 6}] },
                show: false
            }).addTo(map);
            
            routingControl.on('routesfound', function(e) {
                const route = e.routes[0];
                totalDistance = route.summary.totalDistance;
                
                if(route.instructions && route.instructions.length > 0) {
                    const nextText = route.instructions[0].text;
                    document.querySelector('#next-direction span').innerText = "Next street: " + nextText;
                    if(voiceEnabled) {
                        speakInstruction(nextText);
                    }
                }
            });
            
            // Recenter Logic
            document.getElementById("recenterBtn").onclick = () => {
                navigator.geolocation.getCurrentPosition(p => {
                    map.setView([p.coords.latitude, p.coords.longitude], 17);
                });
            };

            // Start Live Tracking Logic
            document.getElementById("startBtn").onclick = () => {
                document.getElementById("startBtn").innerHTML = '<i class="fas fa-play"></i> Routing Active';
                document.getElementById("startBtn").style.background = "#27ae60";

                if (!voiceEnabled) {
                    toggleVoice(); // Auto-enable voice
                }

                if (watchId) navigator.geolocation.clearWatch(watchId);
                
                watchId = navigator.geolocation.watchPosition(function(livePos) {
                    const currLat = livePos.coords.latitude;
                    const currLon = livePos.coords.longitude;
                    
                    userMarker.setLatLng([currLat, currLon]);
                    map.setView([currLat, currLon]);
                    
                    const remain = getDistance(currLat, currLon, destLat, destLon)/1000;
                    document.getElementById("remain").innerText = remain.toFixed(2);
                    
                    const speed = getSpeed();
                    document.getElementById("speed").innerText = speed;
                    
                    const eta = (remain/speed)*60;
                    document.getElementById("eta").innerText = Math.round(eta);
                    
                }, null, {enableHighAccuracy: true});
            };

        });
    }
    
    // Auto start on load
    window.onload = initNavigation;
</script>

  {% include "chatbot/chatbot_widget.html" %}
</body>
</html>
