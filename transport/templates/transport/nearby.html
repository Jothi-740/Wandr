{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Transport - Wandr</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'transport/style.css' %}?v=4.0">

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="side-logo">
      <img src="{% static 'images/logo.png' %}">
    </div>
    <a href="{% url 'home' %}"><i class="fa fa-home"></i></a>
    <a href="{% url 'stay' %}"><i class="fa fa-hotel"></i></a>
    <a href="{% url 'food:nearby_food' %}"><i class="fa fa-utensils"></i></a>
    <a href="{% url 'transport:nearby_transport' %}" class="active"><i class="fa fa-bus"></i></a>
    <a href="{% url 'emergency:dashboard' %}"><i class="fa-solid fa-truck-medical"></i></a>
    <a href="{% url 'account:dashboard' %}"><i class="fa fa-user"></i></a>
  </div>

  <!-- TOP BAR -->
  <div class="topbar topbar-col">
    <button class="back-btn" onclick="window.location.href='{% url 'home' %}';">
      <i class="fa fa-arrow-left"></i>
    </button>
    <h2 style="margin-left: 0;">Nearby Transport</h2>
  </div>

  <div class="category-container" id="categoryContainer">

    <div class="category-card" onclick="getBus()">
      <div class="category-icon">🚌</div>
      <h3 class="category-title">Bus Stops</h3>
    </div>

    <div class="category-card" onclick="getTrain()">
      <div class="category-icon">🚆</div>
      <h3 class="category-title">Railway Stations</h3>
    </div>

  </div>

  <div class="main-layout" id="main-layout" style="display: none;">
    <div class="left-panel">
      <h2 id="left-title">Map & Directions</h2>
      <div id="directions-panel"></div>
      <div id="map"></div>
    </div>

    <div class="right-panel" id="places-panel">
      <h2 id="right-title">Nearby Places</h2>
      <p id="status" style="font-weight: bold; color: #4cc9f0;">Select an option to start exploring!</p>
      <div id="results"></div>
    </div>

    <div class="right-panel" id="nav-panel" style="display: none;">
      <h2 id="nav-dest-title">Route Details</h2>

      <div class="direction-header" id="next-direction">
        <div class="direction-icon">
          <i class="fas fa-arrow-up"></i>
        </div>
        <div class="next-street-text">
          <span>Next street: --</span>
          <i class="fas fa-volume-up" id="voiceToggle" style="cursor: pointer; color: #4cc9f0;" onclick="toggleVoice()"
            title="Toggle Voice Directions"></i>
        </div>
      </div>
      <div class="divider"></div>

      <div class="stats-box" style="margin-top: 20px; text-align: left;">
        Distance: <span id="distance">--</span><br>
        ETA: <span id="time">--</span><br>
        Speed: <span id="speed">0</span> km/h<br>
        Remaining: <span id="remain">0</span> km
      </div>

      <div class="actions" style="margin-top: 30px; display: flex; gap: 15px;">
        <button class="btn-recenter" id="recenterBtn" style="flex: 1;"><i class="fas fa-map-marker-alt"
            style="color:#e74c3c;"></i> Recenter</button>
        <button class="btn-start" id="startBtn" style="flex: 1; background: #27ae60;"><i class="fas fa-play"></i> Start
          Journey</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

  <script src="{% static 'transport/script.js' %}?v=4.0"></script>

  {% include "chatbot/chatbot_widget.html" %}
</body>

</html>
