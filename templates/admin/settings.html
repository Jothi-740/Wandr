{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block content %}
<div id="content-main">
    <!-- Welcome Header as per sketch -->
    <div style="background: rgba(46, 196, 255, 0.05); border: 1px solid rgba(46, 196, 255, 0.2); border-radius: 20px; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
        <h2 style="margin: 0; color: #fff;">Welcome, {{ user.username }}!</h2>
        <div style="display: flex; gap: 10px;">
            <a href="/" target="_blank" style="padding: 8px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: #fff; text-decoration: none; font-size: 13px;">Visit site</a>
            <a href="{% url 'admin:logout' %}" style="padding: 8px 20px; background: rgba(255, 82, 82, 0.1); border: 1px solid rgba(255, 82, 82, 0.2); border-radius: 20px; color: #ff5252; text-decoration: none; font-size: 13px;">Logout</a>
        </div>
    </div>

    <!-- Layout Grid -->
    <div style="display: grid; grid-template-columns: 1fr; gap: 30px;">
        
        <!-- Change Password Section -->
        <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 35px;">
            <h3 style="margin-top: 0; color: #2ec4ff; font-size: 20px; margin-bottom: 25px;"><i class="fa fa-key"></i> Change Password</h3>
            <div style="background: rgba(0,0,0,0.2); border: 1px dashed rgba(255,255,255,0.1); border-radius: 15px; height: 120px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3);">
                <a href="{% url 'admin:password_change' %}" style="color: #2ec4ff; text-decoration: none; border: 1px solid #2ec4ff; padding: 10px 25px; border-radius: 20px;">Open Password Update Panel</a>
            </div>
        </div>

        <!-- Language Section -->
        <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 35px;">
            <h3 style="margin-top: 0; color: #2ec4ff; font-size: 20px; margin-bottom: 25px;"><i class="fa fa-language"></i> Language</h3>
            <select style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px; border-radius: 15px; outline: none;">
                <option>English (US)</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
            </select>
        </div>

    </div>
</div>
{% endblock %}
