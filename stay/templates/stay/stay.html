{% load static %}

<!DOCTYPE html>
<html>

<head>

  <title>Stay - Wandr</title>

  <!-- Dashboard CSS for sidebar -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="{% static 'stay.css' %}">

</head>

<body class="bg-theme dashboard">
  {% include "translation_scripts.html" %}

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="side-logo">
      <img src="{% static 'images/logo.png' %}">
    </div>
    <a href="{% url 'home' %}"><i class="fa fa-home"></i></a>
    <a href="{% url 'stay' %}" class="active"><i class="fa fa-hotel"></i></a>
    <a href="{% url 'food:nearby_food' %}"><i class="fa fa-utensils"></i></a>
    <a href="{% url 'transport:nearby_transport' %}"><i class="fa fa-bus"></i></a>
    <a href="{% url 'emergency:dashboard' %}"><i class="fa-solid fa-truck-medical"></i></a>
    <a href="{% url 'account:dashboard' %}"><i class="fa fa-user"></i></a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- TOP BAR -->
    <div class="topbar topbar-col">
      <button class="back-btn" onclick="goHome()">
        <i class="fa fa-arrow-left"></i>
      </button>
      
      <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; gap: 10px;">
        <h2 style="margin: 0;">Nearby Hotels</h2>
        <div class="search-container">
          <input type="number" id="radiusInput" class="search-input" placeholder="7km" onkeypress="checkEnter(event)">
          <button onclick="toggleSearch()" class="search-icon-btn">
            <i class="fa fa-search"></i>
          </button>
        </div>
      </div>
    </div>

    <div id="hotelContainer" class="places">
      Loading nearby hotels...
    </div>
  </div>

  <script src="{% static 'js/app.js' %}"></script>
  <script src="{% static 'stay.js' %}"></script>
  {% include "chatbot/chatbot_widget.html" %}

</body>

</html>
